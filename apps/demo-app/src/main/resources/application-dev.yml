# Resilience4j policies for outbound HTTP clients built via
# io.softa.framework.web.rpc.resilience.ResilientRestClientBuilder.
# Each `instances.<name>` entry corresponds to a call site that passes the same
# name to `builder.name(...)`. Missing instances fall back to registry defaults.
resilience4j:
  retry:
    instances:
      # Studio -> runtime metadata upgrade / export (studio-starter)
      studio-remote:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 5s
        retry-exceptions:
          - io.softa.framework.web.resilience.TransientHttpException
          - java.io.IOException
      # Runtime -> studio async upgrade completion webhook (metadata-starter)
      metadata-callback:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 5s
        retry-exceptions:
          - io.softa.framework.web.resilience.TransientHttpException
          - java.io.IOException
      # Internal model RPC (softa-web/rpc/RPCClientImpl)
      softa-rpc:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 3s
        retry-exceptions:
          - io.softa.framework.web.resilience.TransientHttpException
          - java.io.IOException
      # OAuth2 token / userinfo calls (user-starter)
      user-oauth:
        max-attempts: 2
        wait-duration: 500ms
        retry-exceptions:
          - io.softa.framework.web.resilience.TransientHttpException
          - java.io.IOException
      # SMS provider APIs (message-starter)
      sms-provider:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 4s
        retry-exceptions:
          - io.softa.framework.web.resilience.TransientHttpException
          - java.io.IOException
      # Flow webhook task (flow-starter)
      flow-webhook:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 5s
        retry-exceptions:
          - io.softa.framework.web.resilience.TransientHttpException
          - java.io.IOException
  circuitbreaker:
    instances:
      studio-remote:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      metadata-callback:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      softa-rpc:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
      user-oauth:
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s
      sms-provider:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      flow-webhook:
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s

# ---- message-starter: incoming mail resource limits ----
# All five limits below are *defense-in-depth* gates applied to every email
# pulled from IMAP/POP3. Defaults (shown as comments) are tuned for typical
# business mail; raise/lower per environment risk profile. Hits land on
# MailReceiveRecord.truncationReason for SecOps triage.
#softa:
#  message:
#    mail:
#      fetch:
#        # Total RFC822 cap. Server-reported size, sender cannot forge.
#        # Above limit → envelope-only record, BodyTooLarge.
#        max-message-size: 100MB
#        # Per-attachment cap. Above limit → that attachment skipped,
#        # AttachmentTooLarge marker set.
#        max-attachment-size: 20MB
#        # Archive raw EML to file-starter. Default false; opt in for
#        # compliance/audit. Already bounded by max-message-size.
#        archive-eml: false
#        # MIME nesting depth. Real emails ≤6; >10 is suspicious.
#        max-mime-depth: 10
#        # MIME total part count. Real emails ≤30; >100 is suspicious.
#        max-mime-parts: 100
#      transport:
#        # SMTP / IMAP / POP3 socket timeouts. Applied per-Session by
#        # SmtpMailTransport + MailReceiveServiceImpl. Tune down for fast
#        # providers (Gmail, Outlook) to fail faster.
#        connection-timeout: 5s
#        read-timeout: 30s
#    sms:
#      transport:
#        # HTTPS REST timeouts for all SMS provider adapters via smsRestClient.
#        # Resilience4j (sms-provider) wraps these with retry / CB.
#        connection-timeout: 5s
#        read-timeout: 30s

# Expose /actuator/retries and /actuator/circuitbreakers for ops visibility.
management:
  endpoints:
    web:
      exposure:
        include: health, info, retries, circuitbreakers, circuitbreakerevents, retryevents
  endpoint:
    circuitbreakers:
      access: read_only
    retries:
      access: read_only
